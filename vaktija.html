<!DOCTYPE html>
<html lang="bs">

<head>
    <meta charset="UTF-8">
    <title>TV Vaktija</title>
    <link rel="icon" type="image/svg+xml" href="vaktijaFavicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #1e7f4f;
            --gold: #b8860b;
            --text: #1a1a1a;
            --muted: #666;
        }

        body {
            animation: antiBurn 20s infinite alternate;
            font-family: 'Cairo', sans-serif;
            background: url('https://raw.githubusercontent.com/h-suzanj/Bi-er/main/ramadan_15_03_2022_1.jpg') center center / cover fixed;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        @keyframes antiBurn {
            0% {
                transform: translate(0px, 0px);
            }

            100% {
                transform: translate(1px, 1px);
            }
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 62%;
            background: rgba(255, 255, 255, 0.72);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }

        .logo-area {
            padding: 18px 20px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-area svg {
            height: 80px;
            width: auto;
            fill: var(--green);
            flex-shrink: 0;
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4;
            flex: 1;
        }

        .logo-text-block .line1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .logo-text-block .line2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .logo-text-block .line3 {
            font-size: 16px;
            font-weight: 700;
            font-style: italic;
            color: var(--gold);
            letter-spacing: 0.03em;
            margin-top: 4px;
        }

        .clock-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            gap: 14px;
        }

        #clock {
            font-size: 72px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -2px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        @keyframes colonFlash {
            0% {
                opacity: 1;
            }

            15% {
                opacity: 0;
            }

            30% {
                opacity: 1;
            }

            45% {
                opacity: 0;
            }

            60% {
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        .clock-colon {
            display: inline-block;
        }

        .clock-colon.flash {
            animation: colonFlash 0.5s ease-in-out forwards;
        }

        .days-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .day-pill {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--muted);
        }

        .day-pill.active {
            background: var(--green);
            color: #fff;
        }

        .date-row {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .date-box {
            flex: 1;
            max-width: 450px;
            background: rgba(240, 240, 240, 0.60);
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .date-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
        }

        .date-val.hijri {
            color: var(--gold);
        }

        .next-prayer {
            width: 100%;
            text-align: center;
        }

        .next-prayer .np-label {
            font-size: 13px;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .np-name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .np-latin {
            font-size: 22px;
            font-weight: 900;
            color: var(--green);
            letter-spacing: 0.08em;
        }

        .np-separator {
            font-size: 22px;
            color: var(--muted);
        }

        .np-arabic {
            font-family: 'Amiri', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            direction: rtl;
        }

        #ikamet {
            font-size: 52px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }

        .footer-bar {
            background: var(--green);
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            line-height: 1.5;
            flex-shrink: 0;
            border-radius: 8px;
            max-width: 920px;
            width: calc(100% - 40px);
            margin: 0 auto 28px auto;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .footer-text-inner {
            position: absolute;
            width: 100%;
            padding: 0 20px;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        .footer-text-inner.fade-out {
            opacity: 0;
        }

        .right {
            width: 38%;
            background: rgba(255, 255, 255, 0.72);
            display: flex;
            flex-direction: column;
            padding: 28px 32px;
        }

        .panel-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .panel-title::after {
            content: '';
            display: block;
            width: 48px;
            height: 2px;
            background: var(--green);
            margin: 8px auto 0;
        }

        #prayers {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10), 0 1.5px 6px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
            flex: 1;
            background: rgba(255, 255, 255, 0.65);
        }

        .row:first-child {
            border-radius: 10px 10px 0 0;
        }

        .row:last-child {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }

        .row.active {
            background: rgba(232, 245, 238, 0.75);
        }

        .row.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--green);
            border-radius: 4px 0 0 4px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .row.active .dot {
            background: var(--green);
        }

        .name {
            width: 28%;
            font-size: 20px;
            font-weight: 600;
            color: #999;
        }

        .row.active .name {
            color: var(--green);
            font-weight: 700;
        }

        .time {
            flex: 1;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .row.active .time {
            color: var(--green);
        }

        .ar {
            width: 28%;
            text-align: right;
            font-size: 22px;
            font-family: 'Amiri', serif;
            color: #bbb;
            direction: rtl;
        }

        .row.active .ar {
            color: var(--gold);
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="left">
            <div class="logo-area">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 97 97">
                    <path
                        d="M70 36.81v-10l2.36 1.64.4-.21-3.27-6.59-4.28 2.22v15.88c0 2.2 0 3.34-.79 4.32v1.13A9.77 9.77 0 0070 36.81M63.67 51.58l-9.54-3.08 2.3-1.72-.08-.44-7.34 1 .81 4.73 15.23 4.94c2.11.68 3.2 1.05 3.9 2.09l1 .34a9.81 9.81 0 00-6.33-7.9M75.92 62.11l-5.91 8-.94-2.69-.45-.07-1.25 7.24 4.77.7c.47-.65 7.7-10.44 9.45-12.84 1.3-1.78 2-2.69 3.2-3l.66-.88a9.86 9.86 0 00-9.53 3.53M89.78 53.82l5.91 8.06h-2.88l-.2.4 6.56 3.42 2.15-4.28-9.4-12.82c-1.31-1.78-2-2.71-1.92-4l-.65-.89a9.73 9.73 0 00.43 10.07M86.14 38.2l9.56-3.06-.84 2.73.32.31 5.32-5.12-3.45-3.35c-.77.24-12.43 3.95-15.26 4.87-2.12.67-3.21 1-4.4.57l-1 .34a9.92 9.92 0 009.8 2.71" />
                    <path
                        d="M76.34 87.94A41.9 41.9 0 0121.5 48.51 41.9 41.9 0 0176.34 9.08v-.77A49 49 0 0049 0C21.92 0 0 21.72 0 48.5S21.92 97 49 97a49 49 0 0027.38-8.3z"
                        fill-rule="evenodd" />
                </svg>
                <div class="logo-text-block">
                    <div class="line1">Islamska zajednica u Bosni i Hercegovini</div>
                    <div class="line2" id="medžlis-line">Medžlis Islamske zajednice Kakanj</div>
                    <div class="line3">Džemat Bičer - Ž. Stanica</div>
                </div>
            </div>

            <div class="clock-section">
                <div id="clock"></div>
                <div class="days-row" id="days-row"></div>
                <div class="date-row">
                    <div class="date-box">
                        <div class="date-val" id="date"></div>
                    </div>
                    <div class="date-box">
                        <div class="date-val hijri" id="hijri"></div>
                    </div>
                </div>
                <div class="next-prayer">
                    <div class="np-label">Slijedi</div>
                    <div class="np-name-row">
                        <span class="np-latin" id="next-latin"></span>
                        <span class="np-separator" id="next-sep"></span>
                        <span class="np-arabic" id="next-arabic"></span>
                    </div>
                    <div id="ikamet"></div>
                </div>
            </div>

            <div class="footer-bar">
                <div class="footer-text-inner" id="footer-text"></div>
            </div>
        </div>

        <div class="right">
            <div class="panel-title">Vrijeme Namaza</div>
            <div id="prayers"></div>
        </div>
    </div>

    <script>
        // ── FOOTER TEXTS — rotates every 10s, cycles through all entries ──────────
        const FOOTER_TEXTS = [
            "Najbolji od vas su oni koji su najbolji prema svojim ženama. A ja sam među vama najbolji prema svojoj ženi.",
            "Ko isposti ramazan i posti još šest dana u ševvalu, kao da je postio cijelo vrijeme.",
            "Namaz je stub vjere. Onaj ko napusti namaz srušio je svoju vjeru.",
            "Allah zaista voli one koji se često kaju, i voli one koji se mnogo čiste. (Al-Baqara, 222.)",
            "Roditeljima onog ko uči Kur'an i po njemu postupa na Sudnjem danu bit će stavljena kruna, svijetlija od sunca i bit će odjeveni u odjeću kakve nema na dunjaluku.",
            "Allahu, Ti si Mir i Ti ga daješ, blagodaran si Ti, Posjedovatelju veličine i plemenitosti. (Muslim)",
            "Dva rekata sabahskog sunneta bolja su od dunjaluka i svega što je na njemu. (Muslim)",
            "Neće musliman posaditi sadnicu, ili posijati usjev, a da ono što od toga pojede čovjek ili životinja ne bude njemu sadaka. (Muttefekun alejhi)",
            "Reci: 'Gospodaru moj, povećaj mi znanje!' (Kuran, 20:114)",
            "Nemojte jedni drugima zavidjeti, nemojte jedni druge varati, nemojte jedni druge mrziti, nemojte jedni drugima leđa okretati — budite Allahovi robovi braća!",
            "Allahu moj, pomozi mi da Te se sjećam, da Ti zahvaljujem i da Ti lijepo ibadet činim!",
            "Ne vjeruje jedan od vas, sve dok ne bude želio svome bratu ono što želi i sebi.",
            "I u Allaha se pouzdaj, Allah je zaštitnik dovoljan! (Kur'an, 65:3)",
            "O vi koji vjerujete, sebe i porodice svoje čuvajte od vatre... (At-Tahrim: 6)",
            "Ko klanja sabah i ikindiju ući će u Džennet. (Buhari 574. i Muslim 635.)",
            "Allahu, kao što si uljepšao moje stvaranje, uljepšaj i moj moral.",
            "Ko prouči Ajetul-kursijju nakon svakog propisanog namaza, samo ga smrt dijeli od ulaska u Džennet.",
            "I obavljaj molitvu početkom i krajem dana, i u prvim časovima noći! Dobra djela zaista poništavaju rđava. (Hud, 114.)",
            "Ko u toku dana kaže sto puta subhanallahi ve bi hamdihi, bit će mu oprošteni grijesi, pa makar ih bilo koliko morske pjene.",
            "Ko obavi hadž Allaha radi, i pri tome se bude čuvao ružnog govora i loših djela, vratit će se čist od grijeha kao na dan kada ga je majka rodila.",
            "Ko se pokaje prije nego što Sunce izađe sa zapada, On će mu primiti tevbu. (Muslim, br. 2703)",
            "Čovjek je vjere svog prijatelja, pa neka čovjek gleda s kim će se družiti.",
            "Prvo za što će biti pitan rob na sudnjem danu jeste namaz; pa ako namaz bude dobar bit će i ostala djela.",
            "...onome koji se u Allaha uzda, On mu je dosta. Allah će, zaista, ispuniti ono što je odlučio. (Kur'an 65:3)",
            "...a milost Moja obuhvaća sve; daću je onima koji se budu grijeha klonili i zekat davali. (Kur'an 7:156)",
            "Allah nikoga ne opterećuje preko mogućnosti njegovih. (Kur'an 2:286)",
            "Ta, zaista, s mukom je i last, zaista, s mukom je i last! (Kur'an 94:5-6)",
            "Allah, zaista, voli one koji dobra djela čine. (Kuran 2:195)",
            "Reci: 'O robovi moji koji ste se prema sebi ogriješili, ne gubite nadu u Allahovu milost! Allah će, sigurno, sve grijehe oprostiti.' (Kuran 39:53)",
            "Ti sa svakim — lijepo! I traži da se čine dobra djela, a neznalica se kloni! (El-A'raf, 199.)",
            "Ne volite nešto, a ono može biti dobro za vas; nešto volite, a ono ispadne zlo po vas. Allah zna, a vi ne znate. (El Bekare, 216.)",
            "A kada te robovi Moji za Mene upitaju — Ja sam sigurno blizu, odazivam se molbi molitelja kad Me zamoli. (El-Bekara, 186)",
            "O robovi Moji koji ste se prema sebi ogriješili, ne gubite nadu u Allahovu milost! Allah će, sigurno, sve grijehe oprostiti. (Ez-Zumer, 53)",
            "Gospodaru moj, podari mi znanje, i uvrsti me među one koji su dobri, i učini me jednim od onih kojima ćeš džennetske blagodati darovati. (Eš-Šu'ara, 83-85)",
            "Reci: Dogodiće nam se samo ono što nam Allah odredi, On je Gospodar naš. I neka se vjernici samo u Allaha pouzdaju! (Et-Tewba, 51)",
            "A oni koji budu vjerovali i dobra djela činili — oni će stanovnici Dženneta biti i u njemu će vječno boraviti. (Al Bekare, 82)",
            "Sjećajte se vi Mene, i Ja ću se vas sjetiti, i zahvaljujte Mi, i na blagodatima Mojim nezahvalni nemojte biti. (El-Bekara, 152)",
            "Pustio je dva mora da se dodiruju, između njih je pregrada i ona se ne miješaju — pa, koju blagodat Gospodara svoga poričete?! (Er-Rahman, 19-21.)",
            "Dobro i zlo nisu isto! Zlo dobrim uzvrati, pa će ti dušmanin tvoj odjednom prisni prijatelj postati. (Fussilet, 34.)",
            "Sve što je na Zemlji prolazno je, ostaje samo Gospodar tvoj, Veličanstveni i Plemeniti. (Er-Rahman, 26-28)",
            "I nikako za bilo šta ne reci: 'Uradit ću to sigurno sutra!' — ne dodavši: 'Ako Bog da!' (El-Kehf, 24.)",
            "U stvaranju nebesa i zemlje i u izmjeni noći i dana su, zaista, znamenja za razumom obdarene. (Ali-Imran 190-191)",
            "Molite se ponizno i u sebi Gospodaru svome, ne voli On one koji se glasno mole. (El-Araf 55)",
            "O, vjernici često Allaha spominjite i hvalite, i ujutro i naveče Ga veličajte. (El-Ahzab 41-42)",
            "Najviše ljudi koji će ući u džennet bit će zbog bogobojaznosti i lijepog ahlaka.",
            "Meni najbliži od vas bit će oni koji imaju najljepši ahlak, koji su skrušeni i koji mire i zbližavaju. (Tirmizi)",
            "Ko sakrije sramotu svoga brata na dunjaluku, Allah će sakriti njegovu i na dunjaluku i na ahiretu. (Buharija i Muslim)",
            "Ko napusti raspravu kad nije u pravu, bude mu napravljena kuća u džennetskoj mahali. (Ibn Madže i Tirmizi)",
            "Musliman je muslimanu brat: ne nanosi mu nepravdu, ne uskraćuje mu njegova prava i ne ponižava ga. (Muslim)",
        ];

        // ── PRAYER NAMES ──────────────────────────────────────────────────────────
        const names = ["Zora", "Sabah", "Izlazak sunca", "Podne", "Ikindija", "Akšam", "Jacija"];
        const arabic = ["إمساك", "الفجر", "الشروق", "الظهر", "العصر", "المغرب", "العشاء"];
        const NO_NAMAZ = new Set(["Zora", "Izlazak sunca"]);
        const getDisplayName = n => NO_NAMAZ.has(n) ? n.toUpperCase() : n.toUpperCase() + " - NAMAZ";

        // ── HIJRI HELPERS ─────────────────────────────────────────────────────────
        // Returns the current Hijri month (1 = Muharrem … 9 = Ramazan … 12 = Zul-hidždže)
        function getHijriMonth() {
            try {
                const parts = new Intl.DateTimeFormat('en-u-ca-islamic', {
                    month: 'numeric'
                }).formatToParts(new Date());
                const mp = parts.find(x => x.type === 'month');
                return mp ? parseInt(mp.value) : null;
            } catch (e) { return null; }
        }

        function isRamazan() {
            return getHijriMonth() === 9;
        }

        // ── DYNAMIC NAME / TIME RESOLVERS ─────────────────────────────────────────
        // Index 3 = Podne → Džuma on Fridays
        // Index 6 = Jacija → Teravija during Ramazan (time = Akšam + 2h, rounded to full hour)

        function getPrayerName(i) {
            const dow = new Date().getDay(); // 0 Sun … 5 Fri … 6 Sat
            if (i === 3 && dow === 5) return "Džuma";
            if (i === 6 && isRamazan()) return "Teravija";
            return names[i];
        }

        function getPrayerArabic(i) {
            // Teravija doesn't have a standard Arabic name slot — reuse العشاء style
            // Džuma in Arabic: الجمعة
            const dow = new Date().getDay();
            if (i === 3 && dow === 5) return "الجمعة";
            if (i === 6 && isRamazan()) return "تراويح";
            return arabic[i];
        }

        // Round a "HH:MM" time string to the nearest full hour
        function roundToFullHour(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            const rounded = m >= 30 ? (h + 1) % 24 : h;
            return String(rounded).padStart(2, '0') + ':00';
        }

        // Add N hours to a "HH:MM" string, returns "HH:MM"
        function addHours(timeStr, hours) {
            const [h, m] = timeStr.split(':').map(Number);
            const total = (h + hours) % 24;
            return String(total).padStart(2, '0') + ':' + String(m).padStart(2, '0');
        }

        // Returns the effective time for prayer index i given the base vakatTimes array
        function getPrayerTime(i, times) {
            const dow = new Date().getDay();

            // Džuma: Podne time rounded to nearest full hour
            if (i === 3 && dow === 5 && times[3]) {
                return roundToFullHour(times[3]);
            }

            // Teravija: Akšam (index 5) + 2 hours, then round to nearest full hour
            if (i === 6 && isRamazan() && times[5]) {
                return roundToFullHour(addHours(times[5], 2));
            }

            return times[i];
        }

        const CACHE_KEY = 'vaktija_cache';
        let vakatTimes = [];
        let izlazakRaw = '';

        // ── SABAH CALCULATION ─────────────────────────────────────────────────────
        const SABAH_KEY = 'vaktija_sabah';

        function computeSabah(izlazakStr) {
            const toM = s => { const [h, m] = s.split(':'); return +h * 60 + (+m); };
            const toT = m => String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');
            const iz = toM(izlazakStr);

            const stored = localStorage.getItem(SABAH_KEY);
            if (!stored) {
                const sab = Math.round((iz - 37) / 15) * 15;
                const result = toT(sab);
                localStorage.setItem(SABAH_KEY, result);
                return result;
            }

            const prevSab = toM(stored);
            const diff = iz - prevSab;
            if (diff >= 30 && diff <= 45) {
                return stored;
            }
            const sab = Math.ceil((iz - 45) / 15) * 15;
            const result = toT(sab);
            localStorage.setItem(SABAH_KEY, result);
            return result;
        }

        // ── DATA FETCH ────────────────────────────────────────────────────────────
        const FALLBACK_TIMES = ["04:04", "05:00", "05:37", "11:54", "15:22", "18:11", "19:45"];
        const FALLBACK_IZLAZAK = "05:37";

        function applyTimes(zora, izlazak, podne, ikindija, aksam, jacija) {
            izlazakRaw = izlazak;
            const sabah = computeSabah(izlazakRaw);
            vakatTimes = [zora, sabah, izlazak, podne, ikindija, aksam, jacija];
            render();
        }

        let fetchRetryTimer = null;

        async function fetchVakat() {
            try {
                const res = await fetch("https://api.vaktija.ba/vaktija/v1/44");
                if (!res.ok) throw new Error("HTTP " + res.status);
                const data = await res.json();
                const api = data.vakat.slice(0, 6).map(t => {
                    const [h, m] = t.split(':');
                    return h.padStart(2, '0') + ':' + (m || '00').padStart(2, '0');
                });
                if (fetchRetryTimer) { clearTimeout(fetchRetryTimer); fetchRetryTimer = null; }
                if (data.lokacija)
                    document.getElementById('medžlis-line').innerText = 'Medžlis Islamske zajednice ' + data.lokacija;
                applyTimes(api[0], api[1], api[2], api[3], api[4], api[5]);
                localStorage.setItem(CACHE_KEY, JSON.stringify({ date: new Date().toDateString(), times: vakatTimes, izlazak: izlazakRaw }));
            } catch (e) {
                let loaded = false;
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY));
                    if (c && c.times && c.times.length === 7) {
                        applyTimes(c.times[0], c.izlazak, c.times[3], c.times[4], c.times[5], c.times[6]);
                        loaded = true;
                    }
                } catch (e2) { }

                if (!loaded) {
                    applyTimes(
                        FALLBACK_TIMES[0], FALLBACK_IZLAZAK,
                        FALLBACK_TIMES[3], FALLBACK_TIMES[4],
                        FALLBACK_TIMES[5], FALLBACK_TIMES[6]
                    );
                }

                if (!fetchRetryTimer) {
                    fetchRetryTimer = setTimeout(function retry() {
                        fetchRetryTimer = null;
                        fetchVakat();
                    }, 2 * 60 * 1000);
                }
            }
        }

        function render() {
            if (!vakatTimes.length) return;
            const now = new Date();
            let ai = -1;

            // Build effective times (with Džuma/Teravija overrides applied)
            const effectiveTimes = vakatTimes.map((t, i) => getPrayerTime(i, vakatTimes));

            effectiveTimes.forEach((t, i) => {
                const [h, m] = t.split(':'), d = new Date();
                d.setHours(+h, +m, 0);
                if (now >= d) ai = i;
            });
            if (ai === -1) ai = vakatTimes.length - 1;

            document.getElementById('prayers').innerHTML = effectiveTimes.map((t, i) => `
        <div class="row ${i === ai ? 'active' : ''}">
            <div class="dot"></div>
            <div class="name">${getPrayerName(i)}</div>
            <div class="time">${t}</div>
            <div class="ar">${getPrayerArabic(i)}</div>
        </div>`).join('');
        }

        // ── CLOCK ─────────────────────────────────────────────────────────────────
        let lastFlashMin = -1;

        function flash() {
            document.querySelectorAll('.clock-colon').forEach(el => {
                el.classList.remove('flash');
                void el.offsetWidth;
                el.classList.add('flash');
            });
        }

        function updateClock() {
            const now = new Date(), p = n => String(n).padStart(2, '0');
            if (now.getSeconds() === 0 && now.getMinutes() !== lastFlashMin) {
                lastFlashMin = now.getMinutes();
                flash();
            }
            const c = `<span class="clock-colon">:</span>`;
            document.getElementById('clock').innerHTML = `${p(now.getHours())}${c}${p(now.getMinutes())}${c}${p(now.getSeconds())}`;

            const mo = ["januar", "februar", "mart", "april", "maj", "juni", "juli", "august", "septembar", "oktobar", "novembar", "decembar"];
            document.getElementById('date').innerText = `${now.getDate()}. ${mo[now.getMonth()]} ${now.getFullYear()}.`;

            const hm = ["Muharrem", "Safer", "Rebiul-evvel", "Rebiul-ahir", "Džumadel-ula", "Džumadel-uhra", "Redžeb", "Ša'ban", "Ramazan", "Ševval", "Zul-ka'de", "Zul-hidždže"];
            try {
                const hf = new Intl.DateTimeFormat('en-u-ca-islamic', { day: 'numeric', month: 'numeric', year: 'numeric' }).formatToParts(now);
                const hd = hf.find(x => x.type === 'day').value;
                const hmon = parseInt(hf.find(x => x.type === 'month').value) - 1;
                const hy = hf.find(x => x.type === 'year').value;
                document.getElementById('hijri').innerText = `${String(hd).padStart(2, '0')}. ${hm[hmon]} ${hy}.`;
            } catch (e) { }

            buildDays();
            updateIkamet();
            render();
        }

        function buildDays() {
            const today = [1, 2, 3, 4, 5, 6, 0], d = new Date().getDay(), lb = ["P", "U", "S", "Č", "P", "S", "N"];
            document.getElementById('days-row').innerHTML = today.map((x, i) =>
                `<div class="day-pill ${x === d ? 'active' : ''}">${lb[i]}</div>`).join('');
        }

        function updateIkamet() {
            const now = new Date();

            // Build effective times array for countdown logic
            const effectiveTimes = vakatTimes.map((t, i) => getPrayerTime(i, vakatTimes));

            for (let i = 0; i < effectiveTimes.length; i++) {
                const [h, m] = effectiveTimes[i].split(':'), d = new Date();
                d.setHours(+h, +m, 0, 0);
                if (d > now) {
                    const diff = d - now;
                    const hr = Math.floor(diff / 3600000);
                    const mn = Math.floor((diff % 3600000) / 60000);
                    const sc = Math.floor((diff % 60000) / 1000);
                    document.getElementById('ikamet').innerText = `${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')}:${String(sc).padStart(2, '0')}`;
                    document.getElementById('next-latin').innerText = getDisplayName(getPrayerName(i));
                    document.getElementById('next-sep').innerText = '|';
                    document.getElementById('next-arabic').innerText = getPrayerArabic(i);
                    return;
                }
            }

            // After last prayer — count down to tomorrow's Zora
            if (vakatTimes.length > 0) {
                const [zh, zm] = effectiveTimes[0].split(':'), t = new Date();
                t.setDate(t.getDate() + 1); t.setHours(+zh, +zm, 0, 0);
                const diff = t - now;
                const hr = Math.floor(diff / 3600000);
                const mn = Math.floor((diff % 3600000) / 60000);
                const sc = Math.floor((diff % 60000) / 1000);
                document.getElementById('ikamet').innerText = `${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')}:${String(sc).padStart(2, '0')}`;
                document.getElementById('next-latin').innerText = 'ZORA';
                document.getElementById('next-sep').innerText = '|';
                document.getElementById('next-arabic').innerText = arabic[0];
            }
        }

        // ── FOOTER ────────────────────────────────────────────────────────────────
        // Cycles through all 50 entries sequentially, one every 10 seconds
        let footerIndex = 0;
        function updateFooter() {
            footerIndex = (footerIndex + 1) % FOOTER_TEXTS.length;
            const el = document.getElementById('footer-text');
            el.classList.add('fade-out');
            setTimeout(() => { el.innerText = FOOTER_TEXTS[footerIndex]; el.classList.remove('fade-out'); }, 850);
        }

        // ── INIT ──────────────────────────────────────────────────────────────────
        (() => {
            // Start at a random entry so it doesn't always begin from #1 on page load
            footerIndex = Math.floor(Math.random() * FOOTER_TEXTS.length);
            document.getElementById('footer-text').innerText = FOOTER_TEXTS[footerIndex];
        })();

        // One-time migration: clear stale sabah
        (() => {
            localStorage.removeItem(SABAH_KEY);
        })();

        setInterval(updateClock, 1000);
        setInterval(updateFooter, 120000);
        updateClock();
        fetchVakat();

        // Refresh prayer times at midnight
        const _n = new Date();
        const _ms = new Date(_n.getFullYear(), _n.getMonth(), _n.getDate() + 1) - _n;
        setTimeout(() => { fetchVakat(); setInterval(fetchVakat, 86400000); }, _ms);

        // Pixel-shift anti-burn-in
        setInterval(() => {
            document.body.style.transform = "translate(" + Math.random() + "px," + Math.random() + "px)";
        }, 15000);
    </script>
</body>
