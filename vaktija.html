<!DOCTYPE html>
<html lang="bs">

<head>
    <meta charset="UTF-8">
    <title>TV Vaktija</title>
    <link rel="icon" type="image/svg+xml" href="vaktijaFavicon.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Amiri:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --green: #1e7f4f;
            --gold: #b8860b;
            --text: #1a1a1a;
            --muted: #666;
        }

        body {
            animation: antiBurn 20s infinite alternate;
            font-family: 'Cairo', sans-serif;
            background: url('https://raw.githubusercontent.com/h-suzanj/Bi-er/main/ramadan_15_03_2022_1.jpg') center center / cover fixed;
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        @keyframes antiBurn {
            0% {
                transform: translate(0px, 0px);
            }

            100% {
                transform: translate(1px, 1px);
            }
        }

        .container {
            display: flex;
            height: 100vh;
        }

        .left {
            width: 62%;
            background: rgba(255, 255, 255, 0.72);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 1;
        }

        .logo-area {
            padding: 18px 20px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .logo-area svg {
            height: 80px;
            width: auto;
            fill: var(--green);
            flex-shrink: 0;
        }

        .logo-text-block {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            line-height: 1.4;
            flex: 1;
        }

        .logo-text-block .line1 {
            font-size: 17px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .logo-text-block .line2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--green);
            letter-spacing: 0.03em;
            text-transform: uppercase;
        }

        .logo-text-block .line3 {
            font-size: 16px;
            font-weight: 700;
            font-style: italic;
            color: var(--gold);
            letter-spacing: 0.03em;
            margin-top: 4px;
        }

        .clock-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            gap: 14px;
        }

        #clock {
            font-size: 72px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -2px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        /* Quick double-blink animation — fires once per minute */
        @keyframes colonFlash {
            0% {
                opacity: 1;
            }

            15% {
                opacity: 0;
            }

            30% {
                opacity: 1;
            }

            45% {
                opacity: 0;
            }

            60% {
                opacity: 1;
            }

            100% {
                opacity: 1;
            }
        }

        .clock-colon {
            display: inline-block;
        }

        .clock-colon.flash {
            animation: colonFlash 0.5s ease-in-out forwards;
        }

        .days-row {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .day-pill {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: var(--muted);
        }

        .day-pill.active {
            background: var(--green);
            color: #fff;
        }

        .date-row {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .date-box {
            flex: 1;
            max-width: 450px;
            background: rgba(240, 240, 240, 0.60);
            border-radius: 8px;
            padding: 10px 14px;
            text-align: center;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.10), 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .date-val {
            font-size: 18px;
            font-weight: 700;
            color: var(--green);
        }

        .date-val.hijri {
            color: var(--gold);
        }

        .next-prayer {
            width: 100%;
            text-align: center;
        }

        .next-prayer .np-label {
            font-size: 13px;
            color: var(--muted);
            font-style: italic;
            margin-bottom: 4px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .np-name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 4px;
        }

        .np-latin {
            font-size: 22px;
            font-weight: 900;
            color: var(--green);
            letter-spacing: 0.08em;
        }

        .np-separator {
            font-size: 22px;
            color: var(--muted);
        }

        .np-arabic {
            font-family: 'Amiri', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--gold);
            direction: rtl;
        }

        #ikamet {
            font-size: 52px;
            font-weight: 900;
            color: var(--gold);
            letter-spacing: -1px;
            font-variant-numeric: tabular-nums;
            line-height: 1.1;
        }

        .footer-bar {
            background: var(--green);
            padding: 14px 20px;
            font-size: 17px;
            font-weight: 700;
            color: #fff;
            text-align: center;
            line-height: 1.5;
            flex-shrink: 0;
            border-radius: 8px;
            max-width: 920px;
            width: calc(100% - 40px);
            margin: 0 auto 28px auto;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .footer-text-inner {
            position: absolute;
            width: 100%;
            padding: 0 20px;
            opacity: 1;
            transition: opacity 0.8s ease;
        }

        .footer-text-inner.fade-out {
            opacity: 0;
        }

        .right {
            width: 38%;
            background: rgba(255, 255, 255, 0.72);
            display: flex;
            flex-direction: column;
            padding: 28px 32px;
        }

        .panel-title {
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--green);
            margin-bottom: 16px;
            flex-shrink: 0;
        }

        .panel-title::after {
            content: '';
            display: block;
            width: 48px;
            height: 2px;
            background: var(--green);
            margin: 8px auto 0;
        }

        #prayers {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.10), 0 1.5px 6px rgba(0, 0, 0, 0.07);
            overflow: hidden;
        }

        .row {
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #e0e0e0;
            position: relative;
            flex: 1;
            background: rgba(255, 255, 255, 0.65);
        }

        .row:first-child {
            border-radius: 10px 10px 0 0;
        }

        .row:last-child {
            border-bottom: none;
            border-radius: 0 0 10px 10px;
        }

        .row.active {
            background: rgba(232, 245, 238, 0.75);
        }

        .row.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: var(--green);
            border-radius: 4px 0 0 4px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .row.active .dot {
            background: var(--green);
        }

        .name {
            width: 28%;
            font-size: 20px;
            font-weight: 600;
            color: #999;
        }

        .row.active .name {
            color: var(--green);
            font-weight: 700;
        }

        .time {
            flex: 1;
            text-align: center;
            font-size: 28px;
            font-weight: 900;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .row.active .time {
            color: var(--green);
        }

        .ar {
            width: 28%;
            text-align: right;
            font-size: 22px;
            font-family: 'Amiri', serif;
            color: #bbb;
            direction: rtl;
        }

        .row.active .ar {
            color: var(--gold);
        }

        /* Debug bar — hidden unless DEBUG_SABAH = true */
        #sabah-debug {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.82);
            color: #0f0;
            font-family: monospace;
            font-size: 14px;
            padding: 8px 16px;
            z-index: 9999;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="sabah-debug"></div>

    <div class="container">
        <div class="left">
            <div class="logo-area">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 97 97">
                    <path
                        d="M70 36.81v-10l2.36 1.64.4-.21-3.27-6.59-4.28 2.22v15.88c0 2.2 0 3.34-.79 4.32v1.13A9.77 9.77 0 0070 36.81M63.67 51.58l-9.54-3.08 2.3-1.72-.08-.44-7.34 1 .81 4.73 15.23 4.94c2.11.68 3.2 1.05 3.9 2.09l1 .34a9.81 9.81 0 00-6.33-7.9M75.92 62.11l-5.91 8-.94-2.69-.45-.07-1.25 7.24 4.77.7c.47-.65 7.7-10.44 9.45-12.84 1.3-1.78 2-2.69 3.2-3l.66-.88a9.86 9.86 0 00-9.53 3.53M89.78 53.82l5.91 8.06h-2.88l-.2.4 6.56 3.42 2.15-4.28-9.4-12.82c-1.31-1.78-2-2.71-1.92-4l-.65-.89a9.73 9.73 0 00.43 10.07M86.14 38.2l9.56-3.06-.84 2.73.32.31 5.32-5.12-3.45-3.35c-.77.24-12.43 3.95-15.26 4.87-2.12.67-3.21 1-4.4.57l-1 .34a9.92 9.92 0 009.8 2.71" />
                    <path
                        d="M76.34 87.94A41.9 41.9 0 0121.5 48.51 41.9 41.9 0 0176.34 9.08v-.77A49 49 0 0049 0C21.92 0 0 21.72 0 48.5S21.92 97 49 97a49 49 0 0027.38-8.3z"
                        fill-rule="evenodd" />
                </svg>
                <div class="logo-text-block">
                    <div class="line1">Islamska zajednica u Bosni i Hercegovini</div>
                    <div class="line2" id="medžlis-line">Medžlis Islamske zajednice Kakanj</div>
                    <div class="line3">Džemat Bičer - Ž. Stanica</div>
                </div>
            </div>

            <div class="clock-section">
                <div id="clock"></div>
                <div class="days-row" id="days-row"></div>
                <div class="date-row">
                    <div class="date-box">
                        <div class="date-val" id="date"></div>
                    </div>
                    <div class="date-box">
                        <div class="date-val hijri" id="hijri"></div>
                    </div>
                </div>
                <div class="next-prayer">
                    <div class="np-label">Slijedi</div>
                    <div class="np-name-row">
                        <span class="np-latin" id="next-latin"></span>
                        <span class="np-separator" id="next-sep"></span>
                        <span class="np-arabic" id="next-arabic"></span>
                    </div>
                    <div id="ikamet"></div>
                </div>
            </div>

            <div class="footer-bar">
                <div class="footer-text-inner" id="footer-text"></div>
            </div>
        </div>

        <div class="right">
            <div class="panel-title">Vrijeme Namaza</div>
            <div id="prayers"></div>
        </div>
    </div>

    <script>
        // ── FOOTER TEXTS (24 entries, index = hour 0–23) ──────────────────────────
        const FOOTER_TEXTS = [
    /* 00 */ '"Ko isposti ramazan i posti još šest dana u ševvalu, kao da je postio cijelo vrijeme." (Muslim)',
    /* 01 */ '"Allahov Poslanik, s.a.v.s., rekao je: Namaz je stub vjere." (Bejheki)',
    /* 02 */ '"Čistoća je polovina vjere." (Muslim)',
    /* 03 */ '"Najdraži posao Allahu je onaj koji se redovno obavlja, makar bio i mali." (Buhari, Muslim)',
    /* 04 */ '"Ko uči Kur\'an i postupa prema njemu, roditeljima mu se na Sudnjem danu daje kruna svjetlosti." (Ebu Davud)',
    /* 05 */ '"Allahu, ti si Mir, od tebe dolazi mir, tebi se vraća mir." (Muslim)',
    /* 06 */ '"Jutarnji namaz je bolji od dunjaluka i svega na njemu." (Tirmizi)',
    /* 07 */ '"Osmijeh u lice brata tvoga sadaka je." (Tirmizi)',
    /* 08 */ '"Koji god musliman zasadi biljku ili posije sjeme, pa od toga čovjek, ptica ili životinja pojede – to je za njega sadaka." (Buhari)',
    /* 09 */ '"Tražite znanje od kolevke do groba." (predaja)',
    /* 10 */ '"Ne budite zavidni jedan drugome, ne mrzite se, ne okrećite se leđima jedni drugima – budite pravi Allahovi robovi i braća." (Buhari)',
    /* 11 */ '"Allahu moj, pomozi mi da Te se sjećam, da Ti zahvaljujem i da Te lijepo obožavam." (Ebu Davud)',
    /* 12 */ '"Gospodar vaš kaže: Pozovite Me, Ja ću vam se odazvati." (Kur\'an, 40:60)',
    /* 13 */ '"Doista, Allah je lijep i voli ljepotu." (Muslim)',
    /* 14 */ '"Vjernik ne može biti sit dok mu susjed gladuje." (Hakim)',
    /* 15 */ '"Ko se pouzdao u Allaha – On mu je dovoljan." (Kur\'an, 65:3)',
    /* 16 */ '"Najboljim se smatrajte prema ženama." (Buhari, Muslim)',
    /* 17 */ '"Allahu nije drag onaj ko ne voli bližnje." (Buhari, Muslim)',
    /* 18 */ '"Ko klanja akšam – zaštićen je Allahovim zaštitom te noći." (Taberani)',
    /* 19 */ '"Dova je suština ibadeta." (Tirmizi)',
    /* 20 */ '"Allahu moj, uljepšaj mi moj moral kao što si mi uljepšao izgled." (Ahmed)',
    /* 21 */ '"Ko prouči Ajetu-l-kursijju poslije farz-namaza, između njega i dženneta stoji samo smrt." (Nesai)',
    /* 22 */ '"Subhanallahi ve bihamdihi – sto puta dnevno briše grijehe makar ih bilo koliko morske pjene." (Buhari, Muslim)',
    /* 23 */ '"Allahov Poslanik, s.a.v.s., klanjao je noćni namaz sve dok mu noge nisu otekle." (Buhari)',
        ];

        // ── DEBUG ─────────────────────────────────────────────────────────────────
        // DEBUG_SABAH = true  →  shows green bar at bottom with full calculation.
        // DEBUG_IZLAZAK_OVERRIDE = "HH:MM"  →  pretend Izlazak is this time to test
        // threshold switching without waiting for a real date change.
        // When done testing, set both back to false / null.
        const DEBUG_SABAH = false;
        const DEBUG_IZLAZAK_OVERRIDE = null; // e.g. "05:15"  "05:30"  "06:10"

        // ── PRAYER NAMES ─────────────────────────────────────────────────────────
        const names = ["Zora", "Sabah", "Izlazak sunca", "Podne", "Ikindija", "Akšam", "Jacija"];
        const arabic = ["إمساك", "الفجر", "الشروق", "الظهر", "العصر", "المغرب", "العشاء"];
        const NO_NAMAZ = new Set(["Zora", "Izlazak sunca"]);
        const getDisplayName = n => NO_NAMAZ.has(n) ? n.toUpperCase() : n.toUpperCase() + " - NAMAZ";

        const CACHE_KEY = 'vaktija_cache';
        let vakatTimes = [];
        let izlazakRaw = '';

        // ── DYNAMIC SABAH ─────────────────────────────────────────────────────────
        // Gap = Izlazak − Zora (minutes)
        //  < 30  → offset 30 min before Izlazak
        // 30–44  → offset 40 min (default)
        //  ≥ 45  → offset 45 min
        function computeSabah(zoraStr, izlazakStr) {
            const toM = s => { const [h, m] = s.split(':'); return +h * 60 + (+m); };
            const toT = m => String(Math.floor(m / 60)).padStart(2, '0') + ':' + String(m % 60).padStart(2, '0');

            const iz = toM(izlazakStr);
            let sab = toM(zoraStr);

            let diff = iz - sab;

            // ✅ nova logika (30–45 min dozvoljeno)
            if (!(diff >= 30 && diff <= 45)) {
                sab = iz - 45;
            }

            // ✅ rounding na 15 min
            sab = Math.round(sab / 15) * 15;

            // ✅ finalni diff za debug
            diff = iz - sab;

            const result = toT(sab);

            if (DEBUG_SABAH) {
                const dbg = document.getElementById('sabah-debug');
                dbg.style.display = 'block';

                const sabahStr = toT(sab);

                dbg.textContent =
                    `[SABAH DEBUG] Zora: ${zoraStr} | Izlazak: ${izlazakStr} | ` +
                    `Račun: ${izlazakStr} - ${sabahStr} = ${diff} min → Sabah: ${result}`;
            }

            return result;
        }

        async function fetchVakat() {
            try {
                const res = await fetch("https://api.vaktija.ba/vaktija/v1/44");
                const data = await res.json();
                const api = data.vakat.slice(0, 6).map(t => {
                    const [h, m] = t.split(':');
                    return h.padStart(2, '0') + ':' + (m || '00').padStart(2, '0');
                });
                const zoraStr = api[0];
                izlazakRaw = api[1];
                const sabah = computeSabah(zoraStr, DEBUG_IZLAZAK_OVERRIDE || izlazakRaw);
                vakatTimes = [zoraStr, sabah, izlazakRaw, api[2], api[3], api[4], api[5]];
                if (data.lokacija)
                    document.getElementById('medžlis-line').innerText = 'Medžlis Islamske zajednice ' + data.lokacija;
                localStorage.setItem(CACHE_KEY, JSON.stringify({ date: new Date().toDateString(), times: vakatTimes, izlazak: izlazakRaw }));
                render();
            } catch (e) {
                try {
                    const c = JSON.parse(localStorage.getItem(CACHE_KEY));
                    vakatTimes = c && c.times ? c.times : ["04:50", "05:10", "06:30", "13:05", "16:22", "19:27", "21:00"];
                    izlazakRaw = (c && c.izlazak) || "06:30";
                } catch (e2) {
                    vakatTimes = ["04:50", "05:10", "06:30", "13:05", "16:22", "19:27", "21:00"];
                    izlazakRaw = "06:30";
                }
                render();
            }
        }

        function render() {
            if (!vakatTimes.length) return;
            const now = new Date(); let ai = -1;
            vakatTimes.forEach((t, i) => { const [h, m] = t.split(':'), d = new Date(); d.setHours(+h, +m, 0); if (now >= d) ai = i; });
            document.getElementById('prayers').innerHTML = vakatTimes.map((t, i) => `
        <div class="row ${i === ai ? 'active' : ''}">
            <div class="dot"></div>
            <div class="name">${names[i]}</div>
            <div class="time">${t}</div>
            <div class="ar">${arabic[i]}</div>
        </div>`).join('');
        }

        // ── CLOCK + ANTI-SLEEP BLINK ───────────────────────────────────────────────
        // Colons do a quick double-blink (≈0.5 s) once every minute at :00 seconds.
        let lastFlashMin = -1;

        function flash() {
            document.querySelectorAll('.clock-colon').forEach(el => {
                el.classList.remove('flash');
                void el.offsetWidth;       // restart animation
                el.classList.add('flash');
            });
        }

        function updateClock() {
            const now = new Date(), p = n => String(n).padStart(2, '0');
            if (now.getSeconds() === 0 && now.getMinutes() !== lastFlashMin) {
                lastFlashMin = now.getMinutes();
                flash();
            }
            const c = `<span class="clock-colon">:</span>`;
            document.getElementById('clock').innerHTML = `${p(now.getHours())}${c}${p(now.getMinutes())}${c}${p(now.getSeconds())}`;

            const mo = ["januar", "februar", "mart", "april", "maj", "juni", "juli", "august", "septembar", "oktobar", "novembar", "decembar"];
            document.getElementById('date').innerText = `${now.getDate()}. ${mo[now.getMonth()]} ${now.getFullYear()}.`;

            const hm = ["Muharrem", "Safer", "Rebiul-evvel", "Rebiul-ahir", "Džumadel-ula", "Džumadel-uhra", "Redžeb", "Ša'ban", "Ramazan", "Ševval", "Zul-ka'de", "Zul-hidždže"];
            try {
                const hf = new Intl.DateTimeFormat('en-u-ca-islamic', { day: 'numeric', month: 'numeric', year: 'numeric' }).formatToParts(now);
                const hd = hf.find(x => x.type === 'day').value, hmon = parseInt(hf.find(x => x.type === 'month').value) - 1, hy = hf.find(x => x.type === 'year').value;
                document.getElementById('hijri').innerText = `${String(hd).padStart(2, '0')}. ${hm[hmon]} ${hy}.`;
            } catch (e) { }

            buildDays(); updateIkamet(); render();
        }

        function buildDays() {
            const today = [1, 2, 3, 4, 5, 6, 0], d = new Date().getDay(), lb = ["P", "U", "S", "Č", "P", "S", "N"];
            document.getElementById('days-row').innerHTML = today.map((x, i) => `<div class="day-pill ${x === d ? 'active' : ''}">${lb[i]}</div>`).join('');
        }

        function updateIkamet() {
            const now = new Date();
            for (let i = 0; i < vakatTimes.length; i++) {
                const [h, m] = vakatTimes[i].split(':'), d = new Date(); d.setHours(+h, +m, 0, 0);
                if (d > now) {
                    const diff = d - now, hr = Math.floor(diff / 3600000), mn = Math.floor((diff % 3600000) / 60000), sc = Math.floor((diff % 60000) / 1000);
                    document.getElementById('ikamet').innerText = `${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')}:${String(sc).padStart(2, '0')}`;
                    document.getElementById('next-latin').innerText = getDisplayName(names[i]);
                    document.getElementById('next-sep').innerText = '|';
                    document.getElementById('next-arabic').innerText = arabic[i];
                    return;
                }
            }
            if (vakatTimes.length > 0) {
                const [zh, zm] = vakatTimes[0].split(':'), t = new Date(); t.setDate(t.getDate() + 1); t.setHours(+zh, +zm, 0, 0);
                const diff = t - now, hr = Math.floor(diff / 3600000), mn = Math.floor((diff % 3600000) / 60000), sc = Math.floor((diff % 60000) / 1000);
                document.getElementById('ikamet').innerText = `${String(hr).padStart(2, '0')}:${String(mn).padStart(2, '0')}:${String(sc).padStart(2, '0')}`;
                document.getElementById('next-latin').innerText = 'ZORA';
                document.getElementById('next-sep').innerText = '|';
                document.getElementById('next-arabic').innerText = arabic[0];
            }
        }

        // ── DYNAMIC FOOTER ─────────────────────────────────────────────────────────
        let curFooterHour = -1;
        function updateFooter() {
            const h = new Date().getHours();
            if (h === curFooterHour) return;
            curFooterHour = h;
            const el = document.getElementById('footer-text');
            el.classList.add('fade-out');
            setTimeout(() => { el.innerText = FOOTER_TEXTS[h % FOOTER_TEXTS.length]; el.classList.remove('fade-out'); }, 850);
        }

        // ── INIT ───────────────────────────────────────────────────────────────────
        (() => { const h = new Date().getHours(); document.getElementById('footer-text').innerText = FOOTER_TEXTS[h % FOOTER_TEXTS.length]; curFooterHour = h; })();

        setInterval(updateClock, 1000);
        setInterval(updateFooter, 10000);
        updateClock();
        fetchVakat();
        const _n = new Date(), _ms = new Date(_n.getFullYear(), _n.getMonth(), _n.getDate() + 1) - _n;
        setTimeout(() => { fetchVakat(); setInterval(fetchVakat, 86400000); }, _ms);

        setInterval(() => {
            document.body.style.transform = "translate(" + Math.random() + "px," + Math.random() + "px)";
            window.dispatchEvent(new Event('mousemove'));
        }, 15000);
    </script>
</body>

</html>
